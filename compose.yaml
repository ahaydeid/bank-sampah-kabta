services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: bank-sampah-app:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://admin.sankara.cloud}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-bank_sampah}
      DB_USERNAME: ${DB_USERNAME:-bank_sampah}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public:/var/www/html/public:ro
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache

  queue:
    image: bank-sampah-app:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://admin.sankara.cloud}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-bank_sampah}
      DB_USERNAME: ${DB_USERNAME:-bank_sampah}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: php artisan queue:work --verbose --tries=1 --sleep=3 --timeout=90 --max-time=3600
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache

  scheduler:
    image: bank-sampah-app:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://admin.sankara.cloud}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-bank_sampah}
      DB_USERNAME: ${DB_USERNAME:-bank_sampah}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: php artisan schedule:work
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-bank_sampah}
      MARIADB_USER: ${DB_USERNAME:-bank_sampah}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=30
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - db-data:/var/lib/mysql

volumes:
  app-storage:
  app-cache:
  db-data:
